# ─────────────────────────────────────────────────────────────────
# Netlify build configuration for Next.js 16 + Prisma 7
# Docs: https://docs.netlify.com/frameworks/next-js/overview/
# ─────────────────────────────────────────────────────────────────

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  # Pin a modern Node — Next 16 requires Node 18.18+; we use 20 LTS.
  NODE_VERSION = "20"
  # Skip Husky etc. on CI installs (harmless if not present).
  HUSKY = "0"
  # Tell Next we're in a CI / production context for clearer logs.
  NEXT_TELEMETRY_DISABLED = "1"

# The official Next.js plugin handles SSR, route handlers, ISR, and the
# image optimizer. Netlify auto-installs it when it detects Next, but
# pinning it here makes the build reproducible.
[[plugins]]
  package = "@netlify/plugin-nextjs"
