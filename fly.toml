# fly.toml — Fly.io app config for TimeOff.
# Docs: https://fly.io/docs/reference/configuration/
#
# First-time setup, from the repo root:
#   fly launch --no-deploy --copy-config        # creates the app, keeps this file
#   fly secrets set \
#     DATABASE_URL="postgres://…?sslmode=require" \
#     NEXTAUTH_SECRET="$(openssl rand -base64 32)" \
#     NEXTAUTH_URL="https://<app>.fly.dev"
#   fly deploy
#
# After that, pushes to GitHub auto-deploy via the Fly GitHub integration.

app = "myvacationapp"           # change to whatever name `fly launch` registered
primary_region = "fra"          # Frankfurt — pick what's closest to your users / DB

# Run `prisma migrate deploy` once per release before traffic shifts to the new
# machines. The standalone runner image carries the Prisma CLI for this reason.
[deploy]
  release_command = "npx prisma migrate deploy"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  # Scale to zero when idle, wake on incoming request — fine for an internal
  # tool. Drop these if you'd rather keep a warm machine running 24/7.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
